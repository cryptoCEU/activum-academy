<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background-color: #1E1D16;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 1200px;
      height: 630px;
      background-color: #1E1D16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 64px 80px;
    }

    /* Subtle corner accents */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 120px; height: 3px;
      background: #8C1736;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 120px; height: 3px;
      background: #8C1736;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo-svg {
      height: 120px;
      width: auto;
      display: block;
      margin-bottom: 10px;
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 600;
      letter-spacing: 0.26em;
      color: #F7F2EA;
      text-transform: uppercase;
      line-height: 1;
    }

    .logo-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.38em;
      color: #8C1736;
      text-transform: uppercase;
      margin-top: 6px;
      line-height: 1;
    }

    .divider {
      width: 340px;
      height: 1px;
      background: #8C1736;
      margin: 36px auto 36px;
      opacity: 0.7;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 400;
      font-style: italic;
      color: #F7F2EA;
      text-align: center;
      line-height: 1.25;
      letter-spacing: 0.01em;
      margin-bottom: 18px;
    }

    .topics {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #C4B09A;
      letter-spacing: 0.12em;
      text-align: center;
    }

    .url {
      position: absolute;
      bottom: 28px;
      right: 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #C4B09A;
      letter-spacing: 0.08em;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>
